name: gerenciador

services:
  Gerenciador:
    image: gerenciador:v1
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: Gerenciador
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8083:8084"
    networks:
      - projetosdb-network
  nginx:
    image: nginx:alpine
    container_name: Gerenciador-proxy
    restart: always
    ports:
      - "8085:80"
      - "2083:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../cdn/ssl:/etc/nginx/ssl:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - Gerenciador
    networks:
      - projetosdb-network

networks:
  projetosdb-network: 
    external: true
